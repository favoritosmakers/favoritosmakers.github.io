<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#534AB7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <title>제텔카스텐</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* ── 로딩 화면 ── */
    .loading-screen {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 14px; z-index: 300;
    }
    .loading-screen.hidden { display: none; }
    .spinner {
      width: 32px; height: 32px;
      border: 2.5px solid #e0dfd8;
      border-top-color: #534AB7;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { font-size: 14px; color: #aaa; }

    /* ── 로그인 화면 ── */
    .login-screen {
      position: fixed; inset: 0; background: #fff;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 0; z-index: 200; padding: 40px 32px;
    }
    .login-screen.hidden { display: none; }
    .login-logo {
      width: 56px; height: 56px; border-radius: 14px;
      background: #EEEDFE;
      display: flex; align-items: center; justify-content: center;
      font-size: 26px; margin-bottom: 20px;
    }
    .login-title { font-size: 22px; font-weight: 700; color: #1a1a1a; margin-bottom: 8px; }
    .login-desc { font-size: 14px; color: #888; text-align: center; line-height: 1.6; margin-bottom: 36px; }
    .google-btn {
      display: flex; align-items: center; gap: 12px;
      width: 100%; max-width: 320px;
      padding: 14px 20px;
      border-radius: 12px;
      border: 0.5px solid #d8d7d0;
      background: #fff; color: #1a1a1a;
      font-size: 15px; font-weight: 500;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      font-family: inherit;
    }
    .google-btn:active { background: #f5f4f0; }
    .google-icon {
      width: 20px; height: 20px; flex-shrink: 0;
    }

    /* ── 오프라인 배너 ── */
    .offline-banner {
      display: none;
      background: #fff3cd; color: #856404;
      font-size: 12px; text-align: center; padding: 6px;
    }
    .offline-banner.show { display: block; }

    /* ── 헤더 ── */
    .header {
      position: sticky; top: 0; z-index: 50;
      background: #fff; border-bottom: 0.5px solid #e0dfd8;
      padding: 12px 16px;
    }
    .header-top { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
    .header-top h1 { font-size: 16px; font-weight: 600; flex: 1; }
    .header-actions { display: flex; align-items: center; gap: 8px; }
    .add-btn {
      font-size: 13px; padding: 7px 14px;
      border-radius: 20px; border: none;
      background: #534AB7; color: #fff;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .avatar {
      width: 30px; height: 30px; border-radius: 50%;
      object-fit: cover; cursor: pointer;
      border: 1.5px solid #e0dfd8;
      -webkit-tap-highlight-color: transparent;
    }
    .avatar-placeholder {
      width: 30px; height: 30px; border-radius: 50%;
      background: #EEEDFE; border: 1.5px solid #b0a8e8;
      display: flex; align-items: center; justify-content: center;
      font-size: 12px; font-weight: 600; color: #534AB7;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
      flex-shrink: 0;
    }
    .search-input {
      width: 100%; font-size: 14px; padding: 9px 14px;
      border: 0.5px solid #d8d7d0; border-radius: 10px;
      background: #f5f4f0; color: #1a1a1a; outline: none;
    }
    .search-input:focus { border-color: #7F77DD; background: #fff; }

    /* ── 유저 메뉴 ── */
    .user-menu {
      display: none; position: fixed;
      top: 60px; right: 16px;
      background: #fff; border: 0.5px solid #d8d7d0;
      border-radius: 12px; padding: 14px 16px;
      z-index: 100; min-width: 200px;
      box-shadow: 0 4px 20px rgba(0,0,0,0.1);
    }
    .user-menu.show { display: block; }
    .user-menu-name { font-size: 14px; font-weight: 600; color: #1a1a1a; margin-bottom: 2px; }
    .user-menu-email { font-size: 12px; color: #888; margin-bottom: 12px; }
    .logout-btn {
      width: 100%; font-size: 13px; padding: 8px;
      border-radius: 8px; border: 0.5px solid #f0a0a0;
      background: #fff5f5; color: #c0392b;
      cursor: pointer; font-family: inherit;
    }

    /* ── 메인 ── */
    .main { padding: 14px 14px 80px; }

    /* ── 상자 ── */
    .box-wrap {
      margin-bottom: 12px; border-radius: 14px;
      border: 0.5px solid #d8d7d0; background: #fff; overflow: hidden;
    }
    .box-header {
      display: flex; align-items: center; gap: 10px; padding: 13px 14px;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .box-icon {
      width: 26px; height: 20px; border-radius: 4px;
      background: #f5f4f0; border: 0.5px solid #d8d7d0;
      position: relative; flex-shrink: 0;
    }
    .box-icon::before {
      content: ''; position: absolute; top: -5px; left: 4px;
      width: 10px; height: 5px; border-radius: 2px 2px 0 0;
      background: #f5f4f0; border: 0.5px solid #d8d7d0; border-bottom: none;
    }
    .box-label { font-size: 14px; font-weight: 600; flex: 1; }
    .box-count {
      font-size: 11px; color: #888;
      background: #f5f4f0; border: 0.5px solid #d8d7d0;
      border-radius: 99px; padding: 2px 9px;
    }
    .box-chevron { font-size: 11px; color: #aaa; transition: transform 0.25s; }
    .box-wrap.open .box-chevron { transform: rotate(180deg); }
    .box-wrap.open .box-header { border-bottom: 0.5px solid #e0dfd8; }
    .box-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.2s; opacity: 0;
    }
    .box-wrap.open .box-body { max-height: 9999px; opacity: 1; }
    .drawers { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 6px; }

    /* ── 서랍 ── */
    .drawer-wrap {
      border-radius: 10px; border: 0.5px solid #e0dfd8;
      background: #fafaf8; overflow: hidden;
    }
    .drawer-wrap.open { border-color: #b0a8e8; background: #fff; }
    .drawer-header {
      display: flex; align-items: center; gap: 8px; padding: 10px 12px;
      cursor: pointer; user-select: none; -webkit-tap-highlight-color: transparent;
    }
    .drawer-handle {
      width: 20px; height: 7px; border-radius: 99px;
      background: #e0dfd8; border: 0.5px solid #d8d7d0;
      flex-shrink: 0; position: relative;
    }
    .drawer-handle::after {
      content: ''; position: absolute; top: 50%; left: 50%;
      transform: translate(-50%,-50%);
      width: 8px; height: 2.5px; border-radius: 99px; background: #bbb;
    }
    .drawer-id { font-size: 11px; font-family: monospace; color: #aaa; flex-shrink: 0; }
    .drawer-title { font-size: 13px; font-weight: 500; flex: 1; line-height: 1.4; }
    .drawer-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .drawer-tag { font-size: 10px; padding: 1px 7px; border-radius: 99px; background: #EEEDFE; color: #3C3489; }
    .drawer-links { font-size: 11px; color: #aaa; flex-shrink: 0; }
    .drawer-chevron { font-size: 10px; color: #bbb; transition: transform 0.22s; flex-shrink: 0; }
    .drawer-wrap.open .drawer-chevron { transform: rotate(180deg); }
    .drawer-wrap.open .drawer-header { border-bottom: 0.5px solid #e0dfd8; }
    .drawer-body {
      max-height: 0; overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.2s; opacity: 0;
    }
    .drawer-wrap.open .drawer-body { max-height: 500px; opacity: 1; }

    .card-content { padding: 12px; }
    .card-body-text { font-size: 14px; color: #444; line-height: 1.7; margin-bottom: 12px; }
    .linked-label { font-size: 11px; color: #aaa; margin-bottom: 6px; }
    .linked-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .linked-chip {
      font-size: 12px; padding: 4px 10px; border-radius: 99px;
      border: 0.5px solid #b0a8e8; background: #EEEDFE; color: #3C3489;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .card-actions { display: flex; gap: 8px; }
    .action-btn {
      font-size: 12px; padding: 6px 14px; border-radius: 8px;
      border: 0.5px solid #d8d7d0; background: #f5f4f0; color: #555;
      cursor: pointer; -webkit-tap-highlight-color: transparent;
    }
    .action-btn.del { color: #c0392b; border-color: #f0a0a0; background: #fff5f5; }

    .empty-global { text-align: center; color: #aaa; font-size: 14px; padding: 60px 0; line-height: 1.8; }

    /* ── 모달 바텀시트 ── */
    .modal-backdrop {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 100;
      align-items: flex-end; justify-content: center;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: #fff; border-radius: 20px 20px 0 0;
      padding: 20px 20px 36px;
      width: 100%; max-width: 560px; max-height: 90vh; overflow-y: auto;
    }
    .modal-handle {
      width: 36px; height: 4px; border-radius: 99px;
      background: #ddd; margin: 0 auto 16px;
    }
    .modal h3 { font-size: 16px; font-weight: 600; margin-bottom: 16px; }
    .field { margin-bottom: 12px; }
    .field label { font-size: 12px; color: #888; display: block; margin-bottom: 5px; }
    .field input, .field textarea {
      width: 100%; font-size: 14px;
      border: 0.5px solid #d8d7d0; border-radius: 10px;
      padding: 10px 12px; background: #f5f4f0; color: #1a1a1a;
      resize: none; font-family: inherit; outline: none;
    }
    .field input:focus, .field textarea:focus { border-color: #7F77DD; background: #fff; }
    .field textarea { height: 90px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns button {
      flex: 1; font-size: 14px; padding: 12px; border-radius: 12px;
      border: 0.5px solid #d8d7d0; background: #f5f4f0; color: #1a1a1a;
      cursor: pointer; font-family: inherit;
    }
    .modal-btns .save { background: #534AB7; border-color: #534AB7; color: #fff; font-weight: 600; }

    /* ── 토스트 ── */
    .toast {
      position: fixed; bottom: 24px; left: 50%;
      transform: translateX(-50%);
      background: #1a1a1a; color: #fff;
      font-size: 12px; padding: 8px 18px;
      border-radius: 99px; opacity: 0;
      transition: opacity 0.2s; pointer-events: none; z-index: 400;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<!-- 로딩 -->
<div class="loading-screen" id="loading">
  <div class="spinner"></div>
  <div class="loading-text">불러오는 중...</div>
</div>

<!-- 로그인 화면 -->
<div class="login-screen hidden" id="login-screen">
  <div class="login-logo">🗃</div>
  <div class="login-title">제텔카스텐</div>
  <div class="login-desc">나만의 아이디어 카드 시스템<br>Google 계정으로 시작하세요</div>
  <button class="google-btn" onclick="signInWithGoogle()">
    <svg class="google-icon" viewBox="0 0 24 24">
      <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
      <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
      <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/>
      <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
    </svg>
    Google 계정으로 로그인
  </button>
</div>

<!-- 오프라인 배너 -->
<div class="offline-banner" id="offline-banner">
  오프라인 상태입니다. 인터넷 연결 후 자동 동기화됩니다.
</div>

<!-- 앱 본체 (로그인 후에만 표시) -->
<div id="app" style="display:none">
  <div class="header">
    <div class="header-top">
      <h1>제텔카스텐</h1>
      <div class="header-actions">
        <button class="add-btn" onclick="openModal(null)">+ 새 카드</button>
        <div class="avatar-placeholder" id="avatar-wrap" onclick="toggleUserMenu()">?</div>
      </div>
    </div>
    <input class="search-input" type="text" id="search" placeholder="카드 검색..." oninput="render()">
  </div>

  <div class="main" id="cabinet"></div>

  <!-- 유저 메뉴 -->
  <div class="user-menu" id="user-menu">
    <div class="user-menu-name" id="user-name"></div>
    <div class="user-menu-email" id="user-email"></div>
    <button class="logout-btn" onclick="signOut()">로그아웃</button>
  </div>
</div>

<!-- 카드 편집 모달 -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">새 카드</h3>
    <div class="field"><label>제목</label><input id="m-title" type="text" placeholder="핵심 아이디어 한 줄"></div>
    <div class="field"><label>내용</label><textarea id="m-body" placeholder="하나의 아이디어만 간결하게..."></textarea></div>
    <div class="field"><label>태그 (쉼표로 구분)</label><input id="m-tags" type="text" placeholder="예: 철학, 인식론"></div>
    <div class="field"><label>연결 카드 ID (쉼표로 구분)</label><input id="m-links" type="text" placeholder="예: 001, 003"></div>
    <div class="modal-btns">
      <button onclick="closeModal()">취소</button>
      <button class="save" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js';
  import {
    getAuth, GoogleAuthProvider, signInWithPopup,
    signOut as fbSignOut, onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
  import {
    getFirestore, collection, addDoc, setDoc, deleteDoc, doc, onSnapshot
  } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';

  // ════════════════════════════════════════════════
  // ★ Firebase 콘솔에서 복사한 설정값을 여기에 붙여넣기
  const firebaseConfig = {
    apiKey:            "여기에_붙여넣기",
    authDomain:        "여기에_붙여넣기",
    projectId:         "여기에_붙여넣기",
    storageBucket:     "여기에_붙여넣기",
    messagingSenderId: "여기에_붙여넣기",
    appId:             "여기에_붙여넣기"
  };
  // ════════════════════════════════════════════════

  const app      = initializeApp(firebaseConfig);
  const auth     = getAuth(app);
  const db       = getFirestore(app);
  const provider = new GoogleAuthProvider();

  let unsubscribeSnapshot = null;

  // 오프라인 감지
  window.addEventListener('online',  () => document.getElementById('offline-banner').classList.remove('show'));
  window.addEventListener('offline', () => document.getElementById('offline-banner').classList.add('show'));

  // ── 인증 상태 감지 ──────────────────────────────
  onAuthStateChanged(auth, user => {
    document.getElementById('loading').classList.add('hidden');

    if (user) {
      // 로그인 상태
      document.getElementById('login-screen').classList.add('hidden');
      document.getElementById('app').style.display = 'block';

      // 아바타
      const wrap = document.getElementById('avatar-wrap');
      if (user.photoURL) {
        wrap.innerHTML = `<img class="avatar" src="${user.photoURL}" onclick="toggleUserMenu()">`;
      } else {
        wrap.textContent = user.displayName ? user.displayName[0].toUpperCase() : '?';
      }
      document.getElementById('user-name').textContent  = user.displayName || '사용자';
      document.getElementById('user-email').textContent = user.email;

      // 이 유저의 카드만 실시간 구독
      const colRef = collection(db, 'users', user.uid, 'cards');
      window._colRef = colRef;
      window._db     = db;
      window._uid    = user.uid;

      if (unsubscribeSnapshot) unsubscribeSnapshot();
      unsubscribeSnapshot = onSnapshot(colRef, snapshot => {
        window.cards = snapshot.docs.map(d => ({ _docId: d.id, ...d.data() }));
        window.render();
      }, () => {
        document.getElementById('cabinet').innerHTML =
          '<div class="empty-global">데이터를 불러올 수 없습니다.<br>잠시 후 다시 시도해주세요.</div>';
      });

    } else {
      // 로그아웃 상태
      if (unsubscribeSnapshot) { unsubscribeSnapshot(); unsubscribeSnapshot = null; }
      window.cards = [];
      document.getElementById('app').style.display = 'none';
      document.getElementById('login-screen').classList.remove('hidden');
    }
  });

  // ── Google 로그인 ────────────────────────────────
  window.signInWithGoogle = async function () {
    try {
      await signInWithPopup(auth, provider);
    } catch (e) {
      if (e.code !== 'auth/popup-closed-by-user') {
        alert('로그인 실패: ' + e.message);
      }
    }
  };

  // ── 로그아웃 ─────────────────────────────────────
  window.signOut = async function () {
    await fbSignOut(auth);
    document.getElementById('user-menu').classList.remove('show');
  };

  // ── 저장 ─────────────────────────────────────────
  window.saveCard = async function () {
    const title = document.getElementById('m-title').value.trim();
    const body  = document.getElementById('m-body').value.trim();
    const tags  = document.getElementById('m-tags').value.split(',').map(t => t.trim()).filter(Boolean);
    const links = document.getElementById('m-links').value.split(',').map(t => t.trim()).filter(Boolean);
    if (!title) return;

    function nextId() {
      const nums = window.cards.map(c => parseInt(c.id) || 0);
      return String((nums.length ? Math.max(...nums) : 0) + 1).padStart(3, '0');
    }

    try {
      if (window.editingId) {
        const c = window.cards.find(x => x.id === window.editingId);
        if (c) await setDoc(doc(db, 'users', window._uid, 'cards', c._docId),
          { id: c.id, title, body, tags, links });
      } else {
        const id = nextId();
        await addDoc(window._colRef, { id, title, body, tags, links });
        tags.forEach(t => window.openBoxes.add(t));
        window.openDrawers.add(id);
      }
      window.showToast('저장됨');
      window.closeModal();
    } catch (e) {
      alert('저장 실패: ' + e.message);
    }
  };

  // ── 삭제 ─────────────────────────────────────────
  window.deleteCard = async function (id) {
    if (!confirm('이 카드를 삭제할까요?')) return;
    const c = window.cards.find(x => x.id === id);
    if (!c) return;
    const linked = window.cards.filter(x => (x.links || []).includes(id));
    for (const lc of linked) {
      await setDoc(doc(db, 'users', window._uid, 'cards', lc._docId),
        { ...lc, links: lc.links.filter(l => l !== id) });
    }
    await deleteDoc(doc(db, 'users', window._uid, 'cards', c._docId));
    window.openDrawers.delete(id);
    window.showToast('삭제됨');
  };
</script>

<script>
  // ── UI 상태 ──────────────────────────────────────
  window.cards       = [];
  window.openBoxes   = new Set();
  window.openDrawers = new Set();
  window.editingId   = null;

  // ── 유저 메뉴 ────────────────────────────────────
  window.toggleUserMenu = function () {
    document.getElementById('user-menu').classList.toggle('show');
  };
  document.addEventListener('click', e => {
    const menu = document.getElementById('user-menu');
    const wrap = document.getElementById('avatar-wrap');
    if (!menu.contains(e.target) && !wrap.contains(e.target)) {
      menu.classList.remove('show');
    }
  });

  // ── 토스트 ──────────────────────────────────────
  window.showToast = function (msg) {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1600);
  };

  // ── 그룹핑 ──────────────────────────────────────
  function groupByTag(list) {
    const map = {};
    list.forEach(c => {
      (c.tags || []).forEach(tag => {
        if (!map[tag]) map[tag] = [];
        map[tag].push(c);
      });
    });
    return map;
  }

  // ── 토글 ────────────────────────────────────────
  window.toggleBox = function (tag) {
    openBoxes.has(tag) ? openBoxes.delete(tag) : openBoxes.add(tag);
    render();
  };
  window.toggleDrawer = function (id) {
    openDrawers.has(id) ? openDrawers.delete(id) : openDrawers.add(id);
    render();
  };
  window.jumpTo = function (id) {
    const c = cards.find(x => x.id === id);
    if (!c || !c.tags.length) return;
    openBoxes.add(c.tags[0]);
    openDrawers.add(id);
    render();
    setTimeout(() => {
      const el = document.getElementById('drawer-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 120);
  };

  // ── 모달 ────────────────────────────────────────
  window.openModal = function (id) {
    editingId = id;
    document.getElementById('modal-title').textContent = id ? '카드 편집' : '새 카드';
    if (id) {
      const c = cards.find(x => x.id === id);
      document.getElementById('m-title').value = c.title;
      document.getElementById('m-body').value  = c.body;
      document.getElementById('m-tags').value  = (c.tags  || []).join(', ');
      document.getElementById('m-links').value = (c.links || []).join(', ');
    } else {
      ['m-title','m-body','m-tags','m-links'].forEach(i => document.getElementById(i).value = '');
    }
    document.getElementById('modal').classList.add('show');
  };
  window.closeModal = function () {
    document.getElementById('modal').classList.remove('show');
    editingId = null;
  };
  window.handleBackdropClick = function (e) {
    if (e.target === document.getElementById('modal')) closeModal();
  };

  // ── 렌더 ────────────────────────────────────────
  window.render = function () {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = q
      ? cards.filter(c => c.title.toLowerCase().includes(q) || c.body.toLowerCase().includes(q))
      : cards;

    const grouped = groupByTag(filtered);
    const tags    = Object.keys(grouped).sort();
    const cabinet = document.getElementById('cabinet');

    if (!tags.length) {
      cabinet.innerHTML = '<div class="empty-global">카드가 없습니다.<br>+ 새 카드를 눌러 시작하세요!</div>';
      return;
    }

    cabinet.innerHTML = tags.map(tag => {
      const tagCards  = grouped[tag];
      const isBoxOpen = openBoxes.has(tag);

      const drawersHtml = tagCards.map(c => {
        const isOpen    = openDrawers.has(c.id);
        const linked    = (c.links || []).map(lid => cards.find(x => x.id === lid)).filter(Boolean);
        const otherTags = (c.tags  || []).filter(t => t !== tag);

        return `<div class="drawer-wrap${isOpen ? ' open' : ''}" id="drawer-${c.id}">
          <div class="drawer-header" onclick="toggleDrawer('${c.id}')">
            <div class="drawer-handle"></div>
            <span class="drawer-id">#${c.id}</span>
            <span class="drawer-title">${c.title}</span>
            <div class="drawer-badges">
              ${otherTags.slice(0,2).map(t => `<span class="drawer-tag">${t}</span>`).join('')}
            </div>
            ${(c.links||[]).length ? `<span class="drawer-links">↔${c.links.length}</span>` : ''}
            <span class="drawer-chevron">▾</span>
          </div>
          <div class="drawer-body">
            <div class="card-content">
              <div class="card-body-text">${c.body}</div>
              ${linked.length ? `
                <div class="linked-label">연결된 카드</div>
                <div class="linked-chips">
                  ${linked.map(l => `<span class="linked-chip" onclick="jumpTo('${l.id}')">#${l.id} ${l.title}</span>`).join('')}
                </div>` : ''}
              <div class="card-actions">
                <button class="action-btn" onclick="openModal('${c.id}')">편집</button>
                <button class="action-btn del" onclick="deleteCard('${c.id}')">삭제</button>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

      return `<div class="box-wrap${isBoxOpen ? ' open' : ''}">
        <div class="box-header" onclick="toggleBox('${tag}')">
          <div class="box-icon"></div>
          <span class="box-label">${tag}</span>
          <span class="box-count">${tagCards.length}장</span>
          <span class="box-chevron">▾</span>
        </div>
        <div class="box-body">
          <div class="drawers">${drawersHtml}</div>
        </div>
      </div>`;
    }).join('');
  };
</script>
</body>
</html>
