<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="theme-color" content="#534AB7">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <title>제텔카스텐</title>
  <link rel="manifest" href="manifest.json">
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f4f0;
      color: #1a1a1a;
      min-height: 100vh;
    }

    /* 상단 헤더 */
    .header {
      position: sticky;
      top: 0;
      z-index: 50;
      background: #fff;
      border-bottom: 0.5px solid #e0dfd8;
      padding: 12px 16px;
    }
    .header-top {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 10px;
    }
    .header-top h1 {
      font-size: 16px;
      font-weight: 600;
      color: #1a1a1a;
      flex: 1;
    }
    .add-btn {
      font-size: 13px;
      padding: 7px 14px;
      border-radius: 20px;
      border: none;
      background: #534AB7;
      color: #fff;
      cursor: pointer;
      white-space: nowrap;
      -webkit-tap-highlight-color: transparent;
    }
    .search-input {
      width: 100%;
      font-size: 14px;
      padding: 9px 14px;
      border: 0.5px solid #d8d7d0;
      border-radius: 10px;
      background: #f5f4f0;
      color: #1a1a1a;
      outline: none;
    }
    .search-input:focus {
      border-color: #7F77DD;
      background: #fff;
    }

    /* 메인 */
    .main { padding: 14px 14px 80px; }

    /* 상자 (태그 그룹) */
    .box-wrap {
      margin-bottom: 12px;
      border-radius: 14px;
      border: 0.5px solid #d8d7d0;
      background: #fff;
      overflow: hidden;
    }
    .box-header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 14px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .box-icon {
      width: 26px;
      height: 20px;
      border-radius: 4px;
      background: #f5f4f0;
      border: 0.5px solid #d8d7d0;
      position: relative;
      flex-shrink: 0;
    }
    .box-icon::before {
      content: '';
      position: absolute;
      top: -5px;
      left: 4px;
      width: 10px;
      height: 5px;
      border-radius: 2px 2px 0 0;
      background: #f5f4f0;
      border: 0.5px solid #d8d7d0;
      border-bottom: none;
    }
    .box-label {
      font-size: 14px;
      font-weight: 600;
      color: #1a1a1a;
      flex: 1;
    }
    .box-count {
      font-size: 11px;
      color: #888;
      background: #f5f4f0;
      border: 0.5px solid #d8d7d0;
      border-radius: 99px;
      padding: 2px 9px;
    }
    .box-chevron {
      font-size: 11px;
      color: #aaa;
      transition: transform 0.25s;
    }
    .box-wrap.open .box-chevron { transform: rotate(180deg); }
    .box-wrap.open .box-header { border-bottom: 0.5px solid #e0dfd8; }

    /* 상자 바디 슬라이드 */
    .box-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.35s cubic-bezier(0.4,0,0.2,1), opacity 0.2s;
      opacity: 0;
    }
    .box-wrap.open .box-body { max-height: 9999px; opacity: 1; }

    .drawers { padding: 8px 10px 10px; display: flex; flex-direction: column; gap: 6px; }

    /* 서랍 (개별 카드) */
    .drawer-wrap {
      border-radius: 10px;
      border: 0.5px solid #e0dfd8;
      background: #fafaf8;
      overflow: hidden;
    }
    .drawer-wrap.open { border-color: #b0a8e8; background: #fff; }

    .drawer-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      cursor: pointer;
      user-select: none;
      -webkit-tap-highlight-color: transparent;
    }
    .drawer-handle {
      width: 20px;
      height: 7px;
      border-radius: 99px;
      background: #e0dfd8;
      border: 0.5px solid #d8d7d0;
      flex-shrink: 0;
      position: relative;
    }
    .drawer-handle::after {
      content: '';
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      width: 8px;
      height: 2.5px;
      border-radius: 99px;
      background: #bbb;
    }
    .drawer-id {
      font-size: 11px;
      font-family: 'Courier New', monospace;
      color: #aaa;
      flex-shrink: 0;
    }
    .drawer-title {
      font-size: 13px;
      font-weight: 500;
      color: #1a1a1a;
      flex: 1;
      line-height: 1.4;
    }
    .drawer-badges { display: flex; gap: 4px; flex-wrap: wrap; }
    .drawer-tag {
      font-size: 10px;
      padding: 1px 7px;
      border-radius: 99px;
      background: #EEEDFE;
      color: #3C3489;
    }
    .drawer-links { font-size: 11px; color: #aaa; flex-shrink: 0; }
    .drawer-chevron { font-size: 10px; color: #bbb; transition: transform 0.22s; flex-shrink: 0; }
    .drawer-wrap.open .drawer-chevron { transform: rotate(180deg); }
    .drawer-wrap.open .drawer-header { border-bottom: 0.5px solid #e0dfd8; }

    /* 서랍 내용 */
    .drawer-body {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s cubic-bezier(0.4,0,0.2,1), opacity 0.2s;
      opacity: 0;
    }
    .drawer-wrap.open .drawer-body { max-height: 500px; opacity: 1; }

    .card-content { padding: 12px; }
    .card-body-text {
      font-size: 14px;
      color: #444;
      line-height: 1.7;
      margin-bottom: 12px;
    }
    .linked-label { font-size: 11px; color: #aaa; margin-bottom: 6px; }
    .linked-chips { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 12px; }
    .linked-chip {
      font-size: 12px;
      padding: 4px 10px;
      border-radius: 99px;
      border: 0.5px solid #b0a8e8;
      background: #EEEDFE;
      color: #3C3489;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .card-actions { display: flex; gap: 8px; }
    .action-btn {
      font-size: 12px;
      padding: 6px 14px;
      border-radius: 8px;
      border: 0.5px solid #d8d7d0;
      background: #f5f4f0;
      color: #555;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }
    .action-btn.del { color: #c0392b; border-color: #f0a0a0; background: #fff5f5; }

    /* 빈 상태 */
    .empty-global {
      text-align: center;
      color: #aaa;
      font-size: 14px;
      padding: 60px 0;
    }
    .empty-box {
      font-size: 12px;
      color: #bbb;
      text-align: center;
      padding: 14px 0;
    }

    /* 모달 */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.45);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    .modal-backdrop.show { display: flex; }
    .modal {
      background: #fff;
      border-radius: 20px 20px 0 0;
      padding: 20px 20px 36px;
      width: 100%;
      max-width: 560px;
      max-height: 90vh;
      overflow-y: auto;
    }
    .modal-handle {
      width: 36px;
      height: 4px;
      border-radius: 99px;
      background: #ddd;
      margin: 0 auto 16px;
    }
    .modal h3 {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 16px;
      color: #1a1a1a;
    }
    .field { margin-bottom: 12px; }
    .field label {
      font-size: 12px;
      color: #888;
      display: block;
      margin-bottom: 5px;
    }
    .field input, .field textarea {
      width: 100%;
      font-size: 14px;
      border: 0.5px solid #d8d7d0;
      border-radius: 10px;
      padding: 10px 12px;
      background: #f5f4f0;
      color: #1a1a1a;
      resize: none;
      font-family: inherit;
      outline: none;
    }
    .field input:focus, .field textarea:focus {
      border-color: #7F77DD;
      background: #fff;
    }
    .field textarea { height: 90px; line-height: 1.6; }
    .modal-btns { display: flex; gap: 10px; margin-top: 16px; }
    .modal-btns button {
      flex: 1;
      font-size: 14px;
      padding: 12px;
      border-radius: 12px;
      border: 0.5px solid #d8d7d0;
      background: #f5f4f0;
      color: #1a1a1a;
      cursor: pointer;
      font-family: inherit;
    }
    .modal-btns .save {
      background: #534AB7;
      border-color: #534AB7;
      color: #fff;
      font-weight: 600;
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-top">
    <h1>제텔카스텐</h1>
    <button class="add-btn" onclick="openModal(null)">+ 새 카드</button>
  </div>
  <input class="search-input" type="text" id="search" placeholder="카드 검색..." oninput="render()">
</div>

<div class="main" id="cabinet"></div>

<!-- 모달 -->
<div class="modal-backdrop" id="modal" onclick="handleBackdropClick(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modal-title">새 카드</h3>
    <div class="field">
      <label>제목</label>
      <input id="m-title" type="text" placeholder="핵심 아이디어 한 줄">
    </div>
    <div class="field">
      <label>내용</label>
      <textarea id="m-body" placeholder="하나의 아이디어만 간결하게..."></textarea>
    </div>
    <div class="field">
      <label>태그 (쉼표로 구분)</label>
      <input id="m-tags" type="text" placeholder="예: 철학, 인식론">
    </div>
    <div class="field">
      <label>연결 카드 ID (쉼표로 구분)</label>
      <input id="m-links" type="text" placeholder="예: 001, 003">
    </div>
    <div class="modal-btns">
      <button onclick="closeModal()">취소</button>
      <button class="save" onclick="saveCard()">저장</button>
    </div>
  </div>
</div>

<script>
  // ── 데이터 ──────────────────────────────────────────
  const STORAGE_KEY = 'zettel_cards';
  const COUNTER_KEY = 'zettel_counter';

  function loadCards() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      return saved ? JSON.parse(saved) : defaultCards();
    } catch { return defaultCards(); }
  }

  function persistCards() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(cards));
  }

  function defaultCards() {
    return [
      { id:'001', title:'단일 아이디어 기록', body:'각 카드에는 하나의 아이디어만. 간결하고 명확하게. 긴 문장 대신 핵심만 요약한다.', tags:['제텔카스텐','원칙'], links:['002','003'] },
      { id:'002', title:'카드 번호와 연결', body:'고유 번호로 카드를 식별하고 관련 카드를 링크로 연결해 사고 네트워크를 만든다.', tags:['제텔카스텐','구조'], links:['001','003'] },
      { id:'003', title:'네트워크 형성', body:'카드는 개별이 아닌 연결된 존재. 뇌의 신경망처럼 생각이 서로 뻗어나가며 새 통찰을 만든다.', tags:['제텔카스텐','네트워크'], links:['001','002','004'] },
      { id:'004', title:'지속적 업데이트', body:'정적 시스템이 아니다. 새 아이디어를 추가하고 기존 생각과 연결하며 끊임없이 발전시킨다.', tags:['제텔카스텐','방법론'], links:['003','005'] },
      { id:'005', title:'참조와 인용의 편리함', body:'기록된 아이디어는 언제든 재참조 가능. 아이디어 뷔페에서 원하는 생각을 꺼내 새 글을 쓸 수 있다.', tags:['제텔카스텐','활용'], links:['004'] },
    ];
  }

  function getNextId() {
    let n = parseInt(localStorage.getItem(COUNTER_KEY) || '5') + 1;
    localStorage.setItem(COUNTER_KEY, String(n));
    return String(n).padStart(3, '0');
  }

  let cards = loadCards();

  // ── 상태 ──────────────────────────────────────────
  let openBoxes = new Set(['제텔카스텐']);
  let openDrawers = new Set();
  let editingId = null;

  // ── 그룹핑 ─────────────────────────────────────────
  function groupByTag(list) {
    const map = {};
    list.forEach(c => {
      c.tags.forEach(tag => {
        if (!map[tag]) map[tag] = [];
        map[tag].push(c);
      });
    });
    return map;
  }

  // ── 토글 ───────────────────────────────────────────
  function toggleBox(tag) {
    openBoxes.has(tag) ? openBoxes.delete(tag) : openBoxes.add(tag);
    render();
  }

  function toggleDrawer(id) {
    openDrawers.has(id) ? openDrawers.delete(id) : openDrawers.add(id);
    render();
  }

  function jumpTo(id) {
    const c = cards.find(x => x.id === id);
    if (!c || !c.tags.length) return;
    openBoxes.add(c.tags[0]);
    openDrawers.add(id);
    render();
    setTimeout(() => {
      const el = document.getElementById('drawer-' + id);
      if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }, 120);
  }

  // ── 모달 ───────────────────────────────────────────
  function openModal(id) {
    editingId = id;
    document.getElementById('modal-title').textContent = id ? '카드 편집' : '새 카드';
    if (id) {
      const c = cards.find(x => x.id === id);
      document.getElementById('m-title').value = c.title;
      document.getElementById('m-body').value = c.body;
      document.getElementById('m-tags').value = c.tags.join(', ');
      document.getElementById('m-links').value = c.links.join(', ');
    } else {
      ['m-title','m-body','m-tags','m-links'].forEach(i => document.getElementById(i).value = '');
    }
    document.getElementById('modal').classList.add('show');
  }

  function closeModal() {
    document.getElementById('modal').classList.remove('show');
    editingId = null;
  }

  function handleBackdropClick(e) {
    if (e.target === document.getElementById('modal')) closeModal();
  }

  // ── 저장 / 삭제 ────────────────────────────────────
  function saveCard() {
    const title = document.getElementById('m-title').value.trim();
    const body  = document.getElementById('m-body').value.trim();
    const tags  = document.getElementById('m-tags').value.split(',').map(t => t.trim()).filter(Boolean);
    const links = document.getElementById('m-links').value.split(',').map(t => t.trim()).filter(Boolean);
    if (!title) return;

    if (editingId) {
      const c = cards.find(x => x.id === editingId);
      if (c) { c.title = title; c.body = body; c.tags = tags; c.links = links; }
    } else {
      const id = getNextId();
      cards.unshift({ id, title, body, tags, links });
      tags.forEach(t => openBoxes.add(t));
      openDrawers.add(id);
    }

    persistCards();
    closeModal();
    render();
  }

  function deleteCard(id) {
    if (!confirm('이 카드를 삭제할까요?')) return;
    cards = cards.filter(c => c.id !== id);
    cards.forEach(c => { c.links = c.links.filter(l => l !== id); });
    openDrawers.delete(id);
    persistCards();
    render();
  }

  // ── 렌더 ───────────────────────────────────────────
  function render() {
    const q = document.getElementById('search').value.toLowerCase();
    const filtered = q
      ? cards.filter(c => c.title.toLowerCase().includes(q) || c.body.toLowerCase().includes(q))
      : cards;

    const grouped = groupByTag(filtered);
    const tags = Object.keys(grouped).sort();
    const cabinet = document.getElementById('cabinet');

    if (!tags.length) {
      cabinet.innerHTML = '<div class="empty-global">일치하는 카드가 없습니다</div>';
      return;
    }

    cabinet.innerHTML = tags.map(tag => {
      const tagCards = grouped[tag];
      const isBoxOpen = openBoxes.has(tag);

      const drawersHtml = tagCards.map(c => {
        const isOpen = openDrawers.has(c.id);
        const linked = c.links.map(lid => cards.find(x => x.id === lid)).filter(Boolean);
        const otherTags = c.tags.filter(t => t !== tag);

        return `<div class="drawer-wrap${isOpen ? ' open' : ''}" id="drawer-${c.id}">
          <div class="drawer-header" onclick="toggleDrawer('${c.id}')">
            <div class="drawer-handle"></div>
            <span class="drawer-id">#${c.id}</span>
            <span class="drawer-title">${c.title}</span>
            <div class="drawer-badges">
              ${otherTags.slice(0,2).map(t => `<span class="drawer-tag">${t}</span>`).join('')}
            </div>
            ${c.links.length ? `<span class="drawer-links">↔${c.links.length}</span>` : ''}
            <span class="drawer-chevron">▾</span>
          </div>
          <div class="drawer-body">
            <div class="card-content">
              <div class="card-body-text">${c.body}</div>
              ${linked.length ? `
                <div class="linked-label">연결된 카드</div>
                <div class="linked-chips">
                  ${linked.map(l => `<span class="linked-chip" onclick="jumpTo('${l.id}')">#${l.id} ${l.title}</span>`).join('')}
                </div>` : ''}
              <div class="card-actions">
                <button class="action-btn" onclick="openModal('${c.id}')">편집</button>
                <button class="action-btn del" onclick="deleteCard('${c.id}')">삭제</button>
              </div>
            </div>
          </div>
        </div>`;
      }).join('');

      return `<div class="box-wrap${isBoxOpen ? ' open' : ''}">
        <div class="box-header" onclick="toggleBox('${tag}')">
          <div class="box-icon"></div>
          <span class="box-label">${tag}</span>
          <span class="box-count">${tagCards.length}장</span>
          <span class="box-chevron">▾</span>
        </div>
        <div class="box-body">
          <div class="drawers">${drawersHtml}</div>
        </div>
      </div>`;
    }).join('');
  }

  render();
</script>
</body>
</html>
